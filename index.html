<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MD Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
<div class="container-fluid p-4">
<h2>MD Executive Dashboard</h2>

<div class="row g-3 mt-2">
<div class="col-md-3"><div class="card-box"><h6>MOH</h6><h2 id="moh">-</h2></div></div>
<div class="col-md-3"><div class="card-box"><h6>OTIF</h6><h2 id="otif">-</h2></div></div>
<div class="col-md-3"><div class="card-box"><h6>Accuracy</h6><h2 id="accuracy">-</h2></div></div>
<div class="col-md-3"><div class="card-box"><h6>ITO</h6><h2 id="ito">-</h2></div></div>
</div>

<div class="row mt-4">
<div class="col-md-6"><canvas id="demandChart"></canvas></div>
<div class="col-md-6"><canvas id="entityChart"></canvas></div>
</div>

<h4 class="mt-4">Critical SKU</h4>
<table class="table table-striped" id="skuTable">
<thead><tr><th>SKU</th><th>Entity</th><th>Stock</th><th>MOH</th></tr></thead>
<tbody></tbody>
</table>
</div>
<script src="js/app.js"></script>
</body>
</html>
